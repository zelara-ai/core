  # ============================================
  # Linux AppImage Build
  # ============================================
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Guard @zelara/finance — no react-native imports
        shell: bash
        run: |
          if grep -r "react-native" src/packages/finance/ 2>/dev/null; then
            echo "ERROR: @zelara/finance must not import react-native"
            exit 1
          fi
          echo "OK: @zelara/finance is react-native free"

      - name: Build shared packages
