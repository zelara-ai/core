name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*-*'  # Matches v0.1.0-test, v1.0.0-alpha, etc.
      - 'v*.*.*'    # Matches v0.1.0, v1.0.0, etc.

env:
  RELEASE_NAME: ${{ github.ref_name }}

jobs:
  # ============================================
  # Android APK Build
  # ============================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Guard @zelara/finance — no react-native imports
        shell: bash
        run: |
          if grep -r "react-native" src/packages/finance/ 2>/dev/null; then
            echo "ERROR: @zelara/finance must not import react-native"
            exit 1
          fi
          echo "OK: @zelara/finance is react-native free"

      - name: Build shared packages
        run: |
          cd src/packages
          npm install
          npm run build -w @zelara/shared
          npm run build -w @zelara/skill-tree
          npm run build -w @zelara/state
          npm run build -w @zelara/device-linking
          npm run build -w @zelara/finance

      - name: Install dependencies
        run: |
          cd apps/mobile
          npm install --legacy-peer-deps

      - name: Build Android APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK (if keystore available)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cd apps/mobile/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          # Signing will be handled by Gradle if secrets are configured

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  # ============================================
  # Testing Android APK Build
  # ============================================
  build-testing-android:
    name: Build Testing Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build shared packages
        run: |
          cd src/packages
          npm install
          npm run build -w @zelara/shared
          npm run build -w @zelara/state
          npm run build -w @zelara/device-linking

      - name: Install dependencies
        run: |
          cd apps/testing-mobile
          npm install --legacy-peer-deps

      - name: Build Testing Android APK
        run: |
          cd apps/testing-mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename Testing APK for release
        run: |
          cp apps/testing-mobile/android/app/build/outputs/apk/release/app-release.apk \
            apps/testing-mobile/android/app/build/outputs/apk/release/zelara-testing.apk

      - name: Upload Testing APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: testing-android-apk
          path: apps/testing-mobile/android/app/build/outputs/apk/release/zelara-testing.apk
          retention-days: 7

  # ============================================
  # Finance Android APK Build
  # ============================================
  build-finance-android:
    name: Build Finance Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build shared packages
        run: |
          cd src/packages
          npm install
          npm run build -w @zelara/shared
          npm run build -w @zelara/skill-tree
          npm run build -w @zelara/state
          npm run build -w @zelara/device-linking
          npm run build -w @zelara/finance

      - name: Install dependencies
        run: |
          cd apps/finance-mobile
          npm install --legacy-peer-deps

      - name: Build Finance Android APK
        run: |
          cd apps/finance-mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename Finance APK for release
        run: |
          cp apps/finance-mobile/android/app/build/outputs/apk/release/app-release.apk \
            apps/finance-mobile/android/app/build/outputs/apk/release/zelara-finance.apk

      - name: Upload Finance APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-android-apk
          path: apps/finance-mobile/android/app/build/outputs/apk/release/zelara-finance.apk
          retention-days: 7

  # ============================================
  # Windows Desktop EXE Build
  # ============================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Guard @zelara/finance — no react-native imports
        shell: bash
        run: |
          if grep -r "react-native" src/packages/finance/ 2>/dev/null; then
            echo "ERROR: @zelara/finance must not import react-native"
            exit 1
          fi
          echo "OK: @zelara/finance is react-native free"

      - name: Build shared packages
        run: |
          cd src/packages
          npm install
          npm run build -w @zelara/shared
          npm run build -w @zelara/skill-tree
          npm run build -w @zelara/state
          npm run build -w @zelara/device-linking
          npm run build -w @zelara/finance

      - name: Install Tauri dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Build Tauri app
        run: |
          cd apps/desktop
          npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: apps/desktop/src-tauri/target/release/zelara-core.exe
          retention-days: 7

  # ============================================
  # macOS Desktop Build (Intel + Apple Silicon)
  # ============================================
  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Guard @zelara/finance — no react-native imports
        shell: bash
        run: |
          if grep -r "react-native" src/packages/finance/ 2>/dev/null; then
            echo "ERROR: @zelara/finance must not import react-native"
            exit 1
          fi
          echo "OK: @zelara/finance is react-native free"

      - name: Build shared packages
        run: |
          cd src/packages
          npm install
          npm run build -w @zelara/shared
          npm run build -w @zelara/skill-tree
          npm run build -w @zelara/state
          npm run build -w @zelara/device-linking
          npm run build -w @zelara/finance

      - name: Install Tauri dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Build Tauri app (Universal Binary)
        run: |
          cd apps/desktop
          npm run tauri build -- --target universal-apple-darwin

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 7

